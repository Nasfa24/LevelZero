<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#121212">
    <title>System Evaluation - Level Zero</title>
    <style>
        :root { --bg-alabaster: #F4F5F7; --text-onyx: #121212; --mp-cobalt: #0047AB; --hp-alert: #D32F2F; --arise-amethyst: #6200EA; --system-green: #00FF41; --gray-dim: #A0A0A0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #000; display: flex; justify-content: center; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        #app-container { width: 100%; max-width: 480px; min-height: 100vh; background-color: var(--text-onyx); color: var(--bg-alabaster); position: relative; padding: 40px 25px; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.8); overflow: hidden; }
        .progress-container { margin-bottom: 40px; }
        .progress-text { font-family: 'Courier New', Courier, monospace; color: var(--system-green); font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .progress-bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--system-green); width: 0%; transition: width 0.4s ease; }
        .question-wrapper { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; opacity: 1; transition: 0.3s; }
        .question-wrapper.hidden { opacity: 0; transform: translateX(-20px); pointer-events: none; }
        .question-wrapper.incoming { opacity: 0; transform: translateX(20px); }
        .question-category { font-size: 0.75rem; color: var(--arise-amethyst); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; }
        .question-text { font-size: 1.25rem; font-weight: 700; line-height: 1.4; margin-bottom: 40px; }
        .answer-scale { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .scale-btn { flex: 1; aspect-ratio: 1/1; border-radius: 12px; background: rgba(255,255,255,0.05); border: 2px solid #333; color: white; font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .scale-btn:active { transform: scale(0.9); background: var(--arise-amethyst); border-color: var(--arise-amethyst); }
        .scale-labels { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--gray-dim); text-transform: uppercase; font-weight: 700; }
        #loadingOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--text-onyx); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--arise-amethyst); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="app-container">
    <div id="loadingOverlay"><div class="spinner"></div><div class="progress-text" style="text-align: center; margin:0;">KALIBRASI STAT SELESAI.<br>MENGIRIM DATA KE SYSTEM...</div></div>
    <div class="progress-container"><div class="progress-text" id="progressText">EVALUASI: 1 / 12</div><div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div></div>
    <div class="question-wrapper" id="questionArea">
        <div class="question-category" id="qCategory">ANALISIS MENTAL</div>
        <div class="question-text" id="qText">Memuat pertanyaan dari The System...</div>
        <div class="answer-scale">
            <button class="scale-btn" onclick="submitAnswer(1)">1</button><button class="scale-btn" onclick="submitAnswer(2)">2</button><button class="scale-btn" onclick="submitAnswer(3)">3</button><button class="scale-btn" onclick="submitAnswer(4)">4</button><button class="scale-btn" onclick="submitAnswer(5)">5</button>
        </div>
        <div class="scale-labels"><span>Sangat Buruk</span><span>Sangat Baik</span></div>
    </div>
</div>
<script>
    // URL API SAKTI MILIKMU
    const API_URL = "https://script.google.com/macros/s/AKfycbyZ9QtRth9RQVYu0iid5WuZsuNC30sx77DfzIKYJnnl3K2wB60hRf1t3L6SbDck/exec";

    const qDatabase = {
        STR: ["Ceritakan tentang saat Anda harus bekerja di bawah tekanan ekstrem selama berminggu-minggu tanpa henti.", "Jelaskan situasi terberat dalam hidup Anda yang menguji batas ketahanan mental Anda.", "Bagaimana Anda tetap tenang ketika menghadapi kritik pedas dari atasan di depan umum?", "Ceritakan tentang saat Anda harus menyelesaikan proyek dengan tenggat waktu yang menurut Anda tidak masuk akal.", "Pernahkah Anda merasa ingin berhenti dari pekerjaan karena tekanan yang luar biasa? Apa yang membuat Anda bertahan?", "Ceritakan tentang momen ketika Anda harus membuat keputusan sulit dalam hitungan detik.", "Bagaimana Anda menghadapi situasi di mana Anda menjadi sasaran kemarahan klien atau customer?", "Jelaskan saat Anda harus tetap profesional meskipun sedang mengalami masalah pribadi yang berat.", "Ceritakan tentang pengalaman bekerja di lingkungan yang toxic. Bagaimana Anda bertahan?", "Bagaimana Anda mengelola rasa takut gagal saat menghadapi proyek besar yang menentukan karier Anda?", "Ceritakan tentang saat target Anda diubah secara drastis di tengah jalan. Bagaimana respons Anda?", "Pernahkah Anda dipaksa menyerah oleh situasi, tetapi Anda memilih untuk terus berjuang?", "Jelaskan saat Anda harus menahan emosi ketika diperlakukan tidak hormat oleh rekan kerja.", "Bagaimana Anda tetap fokus ketika bekerja di lingkungan yang penuh distorsi dan kebisingan?", "Ceritakan tentang hari terburuk dalam karier Anda dan bagaimana Anda melewatinya.", "Bagaimana Anda mempersiapkan diri secara mental menghadapi hari Senin yang berat?", "Ceritakan tentang saat Anda gagal dalam presentasi besar. Apa yang Anda lakukan segera setelahnya?", "Bagaimana Anda mengatasi rasa frustrasi ketika ide brilian Anda ditolak mentah-mentah?", "Jelaskan saat Anda harus tetap tersenyum melayani orang lain padahal hati sedang hancur.", "Ceritakan tentang situasi di mana Anda adalah satu-satunya orang yang percaya pada kesuksesan proyek tersebut."],
        INT: ["Ceritakan tentang masalah teknis paling rumit yang pernah Anda pecahkan sendirian.", "Jelaskan saat Anda harus menganalisis data dalam jumlah besar untuk menemukan insight penting.", "Bagaimana pendekatan Anda ketika menghadapi masalah yang belum pernah Anda temui sebelumnya?", "Ceritakan tentang situasi di mana solusi sederhana ternyata menyelesaikan masalah kompleks.", "Bagaimana Anda membedakan antara akar masalah dan gejala dari suatu masalah?", "Jelaskan saat Anda harus memecahkan masalah dengan informasi yang sangat minim.", "Ceritakan tentang proyek yang membutuhkan analisis multivariabel yang rumit.", "Bagaimana Anda memvalidasi bahwa solusi Anda benar-benar efektif?", "Pernahkah Anda menemukan kesalahan dalam analisis orang lain? Bagaimana Anda menyampaikannya?", "Jelaskan metode yang Anda gunakan untuk memecah masalah besar menjadi bagian-bagian kecil.", "Ceritakan tentang saat analisis Anda menyelamatkan perusahaan dari kerugian besar.", "Bagaimana Anda mengatasi kebuntuan berpikir saat memecahkan masalah?", "Jelaskan situasi di mana Anda harus berpikir dalam hitungan menit untuk menyelamatkan situasi.", "Ceritakan tentang masalah yang Anda pecahkan dengan pendekatan non-konvensional.", "Bagaimana Anda menganalisis risiko sebelum mengambil keputusan penting?", "Pernahkah analisis Anda terbukti salah? Apa yang Anda pelajari?", "Jelaskan saat Anda harus memprediksi tren atau hasil di masa depan berdasarkan data terbatas.", "Ceritakan tentang sistem atau proses yang Anda buat untuk memecahkan masalah berulang.", "Bagaimana Anda memastikan objektivitas dalam analisis tanpa terpengaruh bias pribadi?", "Jelaskan pendekatan Anda dalam melakukan root cause analysis."],
        VIT: ["Ceritakan tentang rutinitas pagi Anda dari bangun tidur hingga mulai bekerja.", "Bagaimana Anda memastikan kualitas tidur yang cukup di tengah jadwal padat?", "Jelaskan pola makan Anda sehari-hari dan bagaimana pengaruhnya terhadap energi kerja.", "Olahraga apa yang rutin Anda lakukan dan bagaimana Anda konsisten menjalankannya?", "Ceritakan tentang saat Anda merasa paling bertenaga dan paling lesu dalam sehari.", "Bagaimana Anda mengelola energi saat harus bepergian antar kota atau negara?", "Jelaskan strategi Anda untuk tetap segar setelah makan siang.", "Pernahkah Anda mengalami gangguan kesehatan karena pola kerja? Apa yang Anda ubah?", "Ceritakan tentang kebiasaan sehat yang paling sulit Anda pertahankan.", "Bagaimana Anda mengatur asupan kafein atau stimulan lainnya?", "Jelaskan posisi kerja (ergonomi) yang Anda terapkan untuk kesehatan jangka panjang.", "Ceritakan tentang istirahat mikro (micro-breaks) yang Anda lakukan di sela pekerjaan.", "Bagaimana Anda tahu bahwa tubuh Anda membutuhkan istirahat?", "Pernahkah Anda bekerja meskipun sakit? Apa pertimbangannya?", "Jelaskan perubahan gaya hidup sehat yang paling drastis pernah Anda lakukan.", "Ceritakan tentang olahraga favorit Anda dan manfaatnya bagi pekerjaan.", "Bagaimana Anda menjaga hidrasi selama bekerja?", "Jelaskan pengalaman Anda dengan detoks digital atau mengurangi screen time.", "Ceritakan tentang liburan terbaik yang benar-benar memulihkan energi Anda.", "Bagaimana Anda mengatur jadwal olahraga di tengah deadline menumpuk?"],
        CHA: ["Ceritakan tentang saat Anda berhasil membujuk seseorang yang awalnya sangat menolak ide Anda.", "Bagaimana Anda mempersiapkan presentasi untuk mempengaruhi para pengambil keputusan?", "Jelaskan saat Anda harus menjual ide kepada tim yang skeptis.", "Pernahkah Anda mengubah opini publik dalam rapat hanya dengan cara penyampaian Anda?", "Ceritakan tentang negosiasi sulit yang Anda menangkan.", "Bagaimana Anda menyesuaikan gaya komunikasi dengan berbagai tipe kepribadian?", "Jelaskan saat Anda menggunakan storytelling untuk mempengaruhi audiens.", "Ceritakan tentang pitch singkat (elevator pitch) yang berhasil mendapatkan investasi atau persetujuan.", "Bagaimana Anda membangun kredibilitas sebelum mencoba mempengaruhi orang lain?", "Pernahkah Anda mempengaruhi atasan untuk mengubah keputusan? Bagaimana caranya?", "Jelaskan teknik komunikasi non-verbal yang Anda gunakan untuk mempengaruhi.", "Ceritakan tentang saat Anda harus meyakinkan tim yang demotivasi.", "Bagaimana Anda mengatasi keberatan atau penolakan dalam komunikasi?", "Jelaskan saat Anda menggunakan data dan emosi secara seimbang untuk persuasi.", "Ceritakan tentang kampanye atau gerakan yang Anda inisiasi di kantor.", "Bagaimana Anda membangun aliansi sebelum mendorong perubahan besar?", "Pernahkah Anda gagal mempengaruhi orang? Apa yang salah?", "Jelaskan saat Anda mempengaruhi tanpa otoritas formal (bukan atasan langsung).", "Ceritakan tentang penggunaan humor yang efektif dalam komunikasi persuasif.", "Bagaimana Anda tahu bahwa pesan Anda sudah diterima dengan baik?"]
    };

    let evalQ = [], currIdx = 0, rawScores = { STR: 0, INT: 0, VIT: 0, CHA: 0 };

    function initEval() {
        ['STR', 'INT', 'VIT', 'CHA'].forEach(stat => {
            let shuf = qDatabase[stat].sort(() => 0.5 - Math.random());
            shuf.slice(0, 3).forEach(q => evalQ.push({ category: stat, text: q }));
        });
        evalQ = evalQ.sort(() => 0.5 - Math.random());
        renderQ();
    }

    function renderQ() {
        const qArea = document.getElementById('questionArea');
        qArea.classList.remove('hidden'); qArea.classList.add('incoming');
        setTimeout(() => {
            qArea.classList.remove('incoming');
            document.getElementById('qText').innerText = evalQ[currIdx].text;
            let cat = evalQ[currIdx].category;
            document.getElementById('qCategory').innerText = cat === 'STR' ? "KAPASITAS WILLPOWER" : cat === 'INT' ? "ANALISIS KOGNITIF" : cat === 'VIT' ? "MANAJEMEN VITALITAS" : "RESONANSI SOSIAL";
            document.getElementById('progressText').innerText = `EVALUASI: ${currIdx + 1} / 12`;
            document.getElementById('progressBar').style.width = `${((currIdx + 1) / 12) * 100}%`;
        }, 50);
    }

    function submitAnswer(score) {
        rawScores[evalQ[currIdx].category] += score;
        const qArea = document.getElementById('questionArea');
        qArea.classList.add('hidden');
        setTimeout(() => {
            currIdx++;
            (currIdx < 12) ? renderQ() : finishEval();
        }, 300); 
    }

    async function finishEval() {
        document.getElementById('loadingOverlay').style.display = 'flex';
        
        // Tarik data dari pendaftaran
        const pName = localStorage.getItem('lz_player_name') || "Unknown";
        const pEmail = localStorage.getItem('lz_player_email') || "test@test.com";
        const pJob = localStorage.getItem('lz_player_job') || "Novice";
        const pSkills = localStorage.getItem('lz_player_skills') || "";

        try {
            // Tembak data ke The System (Gsheet)
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "AWAKEN_PLAYER", name: pName, email: pEmail, job: pJob, skills: pSkills, scores: rawScores })
            });
            const result = await response.json();
            if (result.success) {
                localStorage.setItem('lz_player_id', result.player_id); // Simpan ID Sistem P-001 ke HP
                window.location.href = 'index.html'; // Melesat ke Dashboard!
            } else {
                alert("MIRA Error: " + result.message);
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        } catch (e) {
            alert("Gagal terhubung. Coba lagi.");
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    }

    window.onload = initEval;
</script>
</body>
</html>
