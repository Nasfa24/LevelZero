<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Zero - The System</title>
    <style>
        /* ==========================================
           TACTICAL HIGH-CONTRAST PALETTE v2
           ========================================== */
        :root {
            --bg-alabaster: #F4F5F7;
            --text-onyx: #121212;
            --system-blue: #0047AB;
            --alert-red: #D32F2F;
            --arise-purple: #6200EA;
            --card-white: #FFFFFF;
        }

        body {
            background-color: var(--bg-alabaster);
            color: var(--text-onyx);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            box-sizing: border-box;
            padding-bottom: 100px;
        }

        /* --- ZONA IDENTITAS --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--text-onyx);
            padding-bottom: 10px;
        }
        .player-info h1 { margin: 0; font-size: 1.2rem; text-transform: uppercase; }
        .player-info p { margin: 5px 0 0 0; font-size: 0.9rem; font-weight: bold; color: var(--system-blue); }
        .gold-display { font-weight: bold; font-size: 1.1rem; color: #B8860B; }

        /* --- ZONA VITALITAS --- */
        .bar-container { margin-bottom: 20px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        .bar-bg { width: 100%; background-color: #E0E0E0; height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 10px; border: 1px solid var(--text-onyx); }
        .hp-fill { height: 100%; background-color: var(--alert-red); width: 0%; transition: width 0.5s; }
        .mp-fill { height: 100%; background-color: var(--system-blue); width: 0%; transition: width 0.5s; }

        /* --- ZONA XP --- */
        .xp-container {
            text-align: center;
            margin-bottom: 30px;
            padding: 10px;
            background-color: var(--card-white);
            border: 2px solid var(--system-blue);
            border-radius: 8px;
            box-shadow: 4px 4px 0px var(--text-onyx);
        }
        .xp-container h2 { margin: 0 0 5px 0; font-size: 0.9rem; color: var(--system-blue); }

        /* --- ZONA QUEST CARDS (BARU) --- */
        .quest-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .quest-card {
            background-color: var(--card-white);
            border: 2px solid var(--text-onyx);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 3px 3px 0px var(--text-onyx);
            transition: all 0.2s ease;
        }
        .quest-info { width: 75%; }
        .quest-info h4 { margin: 0 0 5px 0; font-size: 0.95rem; color: var(--text-onyx); }
        .quest-info p { margin: 0; font-size: 0.75rem; font-weight: bold; }
        
        .reward-text { color: var(--system-blue); }
        .penalty-text { color: var(--alert-red); }

        .btn-check {
            background-color: var(--bg-alabaster);
            border: 2px solid var(--text-onyx);
            padding: 10px 15px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 2px 2px 0px var(--text-onyx);
        }
        .btn-check:active {
            background-color: var(--system-blue);
            color: white;
            box-shadow: 0px 0px 0px var(--text-onyx);
            transform: translate(2px, 2px);
        }

        /* Efek saat quest selesai */
        .quest-card.completed {
            background-color: #E0E0E0;
            border-color: #9E9E9E;
            box-shadow: none;
            opacity: 0.6;
        }
        .quest-card.completed h4 { text-decoration: line-through; color: #757575; }
        .quest-card.completed .btn-check { display: none; }

        /* --- LOADING & NAVIGASI --- */
        #loading { text-align: center; font-weight: bold; color: var(--system-blue); margin-top: 50px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background-color: var(--card-white); border-top: 2px solid var(--text-onyx); display: flex; justify-content: space-around; padding: 10px 0; z-index: 10; }
        .fab-arise { background-color: var(--arise-purple); color: white; border: 2px solid var(--text-onyx); border-radius: 50%; width: 60px; height: 60px; font-weight: bold; font-size: 0.8rem; position: relative; top: -30px; cursor: pointer; box-shadow: 0px 4px 0px var(--text-onyx); }
    </style>
</head>
<body>

    <div class="container" id="app-container" style="display: none;">
        <div class="header">
            <div class="player-info">
                <h1 id="ui-name">PLAYER [LVL. 0]</h1>
                <p id="ui-title">Title</p>
            </div>
            <div class="gold-display">💰 <span id="ui-gold">0</span></div>
        </div>

        <div class="bar-container">
            <div class="bar-label"><span>❤️ HP</span><span id="ui-hp-text">0 / 0</span></div>
            <div class="bar-bg"><div class="hp-fill" id="ui-hp-bar"></div></div>

            <div class="bar-label"><span>🔵 MP</span><span id="ui-mp-text">0 / 0</span></div>
            <div class="bar-bg"><div class="mp-fill" id="ui-mp-bar"></div></div>
        </div>

        <div class="xp-container">
            <h2>✨ NEXT LEVEL PROGRESS</h2>
            <h1 id="ui-xp-text" style="margin:0;">0 XP</h1>
        </div>

        <h3 style="border-bottom: 2px solid var(--text-onyx); padding-bottom: 5px;">DAILY QUESTS</h3>
        
        <div id="ui-quest-list" class="quest-list">
            </div>
    </div>

    <div id="loading">
        <p>> MENGHUBUNGKAN KE SISTEM...</p>
        <p>> MEMBACA QUEST HARI INI...</p>
    </div>

    <div class="bottom-nav">
        <button style="background:none; border:none; font-weight:bold; cursor:pointer;">STATS</button>
        <button class="fab-arise">ARISE</button>
        <button style="background:none; border:none; font-weight:bold; cursor:pointer;">SHOP</button>
    </div>

    <script>
        // GANTI DENGAN URL API-MU YANG ASLI!!!
        const API_URL = 'https://script.google.com/macros/s/AKfycbyZ9QtRth9RQVYu0iid5WuZsuNC30sx77DfzIKYJnnl3K2wB60hRf1t3L6SbDckrQGr/exec';

        async function fetchSystemData() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();

                if (result.status === "success") {
                    updateUI(result);
                } else {
                    alert("Sistem Gagal Memuat Data!");
                }
            } catch (error) {
                console.error("Error connecting to System:", error);
                document.getElementById('loading').innerHTML = "<p style='color:red;'>> KONEKSI TERPUTUS.</p>";
            }
        }

        function updateUI(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';

            // 1. UPDATE DATA PEMAIN (Sekarang berada di dalam data.player)
            const player = data.player;
            document.getElementById('ui-name').innerText = `${player.Nama} [LVL. ${player.Level}]`;
            document.getElementById('ui-title').innerText = player.Title || "No Title";
            document.getElementById('ui-gold').innerText = player.Gold;
            document.getElementById('ui-xp-text').innerText = `${player.XP} XP`;

            const hpPercent = (player.CurrentHP / player.MaxHP) * 100;
            document.getElementById('ui-hp-bar').style.width = `${hpPercent}%`;
            document.getElementById('ui-hp-text').innerText = `${player.CurrentHP} / ${player.MaxHP}`;

            const mpPercent = (player.CurrentMP / player.MaxMP) * 100;
            document.getElementById('ui-mp-bar').style.width = `${mpPercent}%`;
            document.getElementById('ui-mp-text').innerText = `${player.CurrentMP} / ${player.MaxMP}`;

            // 2. RENDER DAFTAR QUESTS
            const questContainer = document.getElementById('ui-quest-list');
            questContainer.innerHTML = ""; // Bersihkan teks loading

            if(data.quests.length === 0) {
                questContainer.innerHTML = "<p style='text-align:center; font-weight:bold;'>Tidak ada misi hari ini. Istirahatlah, Player.</p>";
            } else {
                data.quests.forEach((q, index) => {
                    // Cek apakah quest sudah ditandai "Selesai" di GSheet
                    const isCompleted = (q.Status && q.Status.toString().toLowerCase() === 'selesai');
                    const cardClass = isCompleted ? 'quest-card completed' : 'quest-card';
                    
                    // Format tampilan efek HP/MP negatif
                    let penaltyText = "";
                    if (q.EfekHP < 0) penaltyText += ` | ${q.EfekHP} HP`;
                    if (q.EfekMP < 0) penaltyText += ` | ${q.EfekMP} MP`;

                    const questHTML = `
                        <div class="${cardClass}">
                            <div class="quest-info">
                                <h4>[${q.Kategori}] ${q.NamaQuest}</h4>
                                <p>
                                    <span class="reward-text">+${q.RewardXP} XP | +${q.RewardGold} G</span>
                                    <span class="penalty-text">${penaltyText}</span>
                                </p>
                            </div>
                            <button class="btn-check" onclick="alert('Fitur centang ke GSheet sedang diproses oleh MIRA!')">CHECK</button>
                        </div>
                    `;
                    questContainer.innerHTML += questHTML;
                });
            }
        }

        window.onload = () => { fetchSystemData(); };
    </script>
</body>
</html>
